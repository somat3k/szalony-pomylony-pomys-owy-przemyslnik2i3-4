name: Update Docs Data

on:
  push:
    branches: [main]
    paths:
      - "hololang/lang/lexer.py"
      - "hololang/lang/ast_nodes.py"
      - "hololang/lang/parser.py"
      - "hololang/lang/interpreter.py"
      - "hololang/docs/skills.py"
      - "pyproject.toml"
  schedule:
    # Run weekly on Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    name: Parse language data and update docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install HoloLang
        run: pip install -e ".[dev]"

      - name: Generate language reference data
        run: python docs-site/scripts/parse_lang_data.py

      - name: Commit updated docs data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update language reference data [skip ci]"
          file_pattern: "docs-site/content/**/*.md docs-site/public/lang-data.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
