name: Docs — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  # Also triggered by the update-docs workflow
  workflow_run:
    workflows: ["Update Docs Data"]
    types: [completed]

# Allow deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build NuxtJS docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate static site
        run: npm run generate
        env:
          NUXT_APP_BASE_URL: /szalony-pomylony-pomys-owy-przemyslnik2i3-4/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker:
    name: Build & push docs Docker image
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: ./docs-site
          file: ./docs-site/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hololang-docs:latest
            ghcr.io/${{ github.repository_owner }}/hololang-docs:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
